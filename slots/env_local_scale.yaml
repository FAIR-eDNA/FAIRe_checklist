name: env_local_scale
title: env local scale
description: 'The entity or entities which are in your sample or specimen’s local
  vicinity and which you believe have significant causal influences on your sample.
  Select from ENVO''s layer class: http://purl.obolibrary.org/obo/ENVO_01000281. Examples
  include;  marine pelagic zone [ENVO:00000208], estuarine coastal surface layer [ENVO:01001302],
  shrub layer [ENVO:01000336]'
slot_uri: FAIRe:067
range: string
required: true
pattern: "^.+ \\[ENVO:\\d{8}\\]$"
in_subset:
  - SampleCollection
examples:
  - value: estuarine coastal surface layer [ENVO:01001302]
close_mappings:
  - MIXS:0000013
source: MIXS:0000013
comments:
  - 'Modified from source: description, field_type'
  - 'Informed by: MIxS, DNA-derived data extension'