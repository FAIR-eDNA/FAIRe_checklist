name: pcr_primer_conc_reverse
title: pcr primer conc reverse
description: The stock concentration of the reverse PCR primer (pcr_primer_reverse).
  This refers specifically to the concentration of the primer stock solution, not
  the final concentration in the PCR reaction. For example, using 1 µL of a 5 µM (stock
  concentration) primer in a 25 µL reaction results in a final concentration of 0.2
  µM. Hence the entry for this term would be 5. Unit = µM
slot_uri: FAIRe:200
range: float
recommended: true
in_subset:
- Pcr
examples:
- value: '5.0'
annotations:
  unit:
    tag: unit
    value: µM
