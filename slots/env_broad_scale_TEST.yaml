name: env_broad_scale_TEST
description: "Major environmental system your sample came from. The systems identified should have a coarse spatial grain, to provide the general environmental context of where the sampling was done. Select from ENVO’s biome class: http://purl.obolibrary.org/obo/ENVO_00000428. Examples include; estuarine biome [ENVO:01000020], tropical moist broadleaf forest biome [ENVO:01000228]."
range: string
required: true
examples:
  - value: estuarine biome [ENVO:01000020]
slot_uri: https://w3id.org/mixs/0000012
exact_mappings:
  - https://w3id.org/mixs/0000012
structured_pattern:
  syntax: "^[^\\[]+ \\[ENVO:[0-9]{8}\\]$"
  partial_match: false
  interpolated: false
annotations:
  section: Sample collection
  requirement_level: Mandatory
  requirement_level_condition: Mandatory unless samp_category = negative control, positive control, or PCR standard
  source:
    - MIxS | DNA-derived data extension
  data_type:
    - sampleMetadata
  requirement_level_code: M


