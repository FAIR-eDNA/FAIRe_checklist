name: samp_vol_we_dna_ext
title: samp vol we dna ext
description: Volume or mass of sample or subsamples that was processed for DNA extraction.
  For example, if 1L of water was collected and filtered, and half of the filter paper
  was used for DNA extraction, the entries of samp_size and samp_vol_we_dna_ext should
  be 1L and 500mL respectively. Specify the unit under the term samp_vol_ext_unit.
